# Скопируйте в ai-tester.config.yaml и поправьте под проект.
# Секреты сюда не кладите — этот файл в git. Ключ: переменная OPENAI_API_KEY
# или поле llm.api_key только в локальном ai-tester.config.yaml (он в .gitignore).

llm:
  base_url: "https://api.openai.com/v1"
  model: "gpt-4.1-mini"
  api_key_env: "OPENAI_API_KEY"
  # api_key: null  # опционально в ai-tester.config.yaml: строка ключа, если не хотите env
  temperature: 0.2

docs_dir: "tests/ai-docs"
sessions_dir: "tests/ai-sessions"

# Список разрешённых окружений: target_url при ingest должен совпадать по host с одним из base_url.
# Оставьте пустым envs: [], чтобы отключить проверку (любой target_url).
envs:
  - name: "staging"
    base_url: "https://example.com"
  # - name: "local"
  #   base_url: "http://localhost:3000"
